<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filter Concepts — Van Gogh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --night:    #0B1026;
      --deep:     #0E1530;
      --cadmium:  #F0C040;
      --cobalt:   #2868C0;
      --cyan:     #40A8D0;
      --orange:   #E07030;
      --cypress:  #2A6848;
      --text-hi:  #E8E0D0;
      --text-mid: #908878;
      --text-lo:  #403828;
    }

    body {
      background: var(--night);
      background-image:
        radial-gradient(ellipse at 20% 25%, rgba(40,104,192,0.40) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 15%, rgba(64,168,208,0.25) 0%, transparent 50%),
        radial-gradient(ellipse at 55% 75%, rgba(240,192,64,0.14) 0%, transparent 45%),
        radial-gradient(ellipse at 30% 90%, rgba(42,104,72,0.20) 0%, transparent 50%);
      color: var(--text-hi);
      font-family: 'Fraunces', Georgia, serif;
      min-height: 100vh;
      padding: 3rem 4vw;
    }

    h1 {
      font-size: 1.4rem; font-weight: 300; font-style: italic;
      color: var(--cadmium); opacity: 0.7;
      text-align: center; margin-bottom: 3rem;
      letter-spacing: 0.02em;
    }

    .concept {
      max-width: 900px; margin: 0 auto 5rem;
      position: relative;
    }
    .concept-label {
      font-family: 'Fira Code', monospace;
      font-size: 0.65rem; letter-spacing: 0.15em;
      color: var(--cobalt); margin-bottom: 1.2rem;
      text-transform: uppercase;
    }

    /* fake gallery cards for context */
    .fake-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1rem; margin-top: 1rem;
    }
    .fake-card {
      aspect-ratio: 1; border-radius: 3px;
      box-shadow: 0 0 8px rgba(40,104,192,0.35), 0 0 24px rgba(40,104,192,0.20);
    }
    .fake-card:nth-child(1) { background: linear-gradient(135deg, #1a3a6a, #2856a0, #f0c040 80%); }
    .fake-card:nth-child(2) { background: linear-gradient(135deg, #4a7030, #8ab040, #e8d060 80%); }
    .fake-card:nth-child(3) { background: linear-gradient(135deg, #6848a0, #4060c0, #40a8d0 80%); }
    .fake-card:nth-child(4) { background: linear-gradient(135deg, #a05020, #e07030, #f0c040 80%); }
    .fake-card:nth-child(5) { background: linear-gradient(135deg, #2a4860, #4888b0, #88c8e0 80%); }
    .fake-card:nth-child(6) { background: linear-gradient(135deg, #605830, #908040, #c8b860 80%); }

    /* ═══════════════════════════════════════════
       CONCEPT A — Vertical sidebar filters
       Museum catalog drawer on the left
    ═══════════════════════════════════════════ */
    .ca-layout {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 1.5rem;
    }
    .ca-sidebar {
      border-right: 1px solid rgba(40,104,192,0.15);
      padding-right: 1.2rem;
      padding-top: 0.3rem;
    }
    .ca-group { margin-bottom: 1.4rem; }
    .ca-group-label {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 0.72rem; font-style: italic; font-weight: 300;
      color: var(--cadmium); opacity: 0.6;
      margin-bottom: 0.4rem;
      padding-bottom: 0.2rem;
      border-bottom: 1px solid rgba(240,192,64,0.08);
    }
    .ca-item {
      display: block; width: 100%;
      font-family: 'Fira Code', monospace;
      font-size: 0.62rem; font-weight: 400;
      padding: 0.25rem 0;
      border: none; background: transparent;
      color: var(--text-mid); cursor: pointer;
      letter-spacing: 0.04em; text-align: left;
      transition: color 0.2s;
    }
    .ca-item:hover { color: var(--text-hi); }
    .ca-item.active {
      color: var(--cadmium);
    }
    .ca-item.active::before {
      content: '— ';
      color: var(--cadmium); opacity: 0.5;
    }
    .ca-search {
      font-family: 'Fira Code', monospace;
      font-size: 0.68rem; font-weight: 400;
      background: transparent; border: none;
      border-bottom: 1px solid rgba(40,104,192,0.2);
      color: var(--text-hi); width: 100%;
      padding: 0.3rem 0; outline: none;
      margin-bottom: 1.2rem;
      letter-spacing: 0.04em;
    }
    .ca-search::placeholder { color: var(--text-lo); }
    .ca-count {
      font-family: 'Fira Code', monospace;
      font-size: 0.58rem; color: var(--text-mid);
      letter-spacing: 0.08em;
      margin-top: 0.5rem;
    }

    /* ═══════════════════════════════════════════
       CONCEPT B — Single-line breadcrumb trail
       Reads like: "146 famous · paintings · arles · landscape"
    ═══════════════════════════════════════════ */
    .cb-bar {
      display: flex; align-items: baseline;
      gap: 0.15rem;
      padding: 0.8rem 0;
      flex-wrap: wrap;
    }
    .cb-count {
      font-family: 'Fira Code', monospace;
      font-size: 0.72rem; color: var(--text-hi);
      letter-spacing: 0.04em;
      margin-right: 0.3rem;
    }
    .cb-dropdown {
      position: relative; display: inline-block;
    }
    .cb-selected {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 0.88rem; font-weight: 400; font-style: italic;
      color: var(--cadmium);
      cursor: pointer;
      border: none; background: transparent;
      padding: 0.15rem 0.1rem;
      border-bottom: 1px dashed rgba(240,192,64,0.3);
      transition: border-color 0.2s;
    }
    .cb-selected:hover { border-color: var(--cadmium); }
    .cb-sep {
      color: var(--cobalt); opacity: 0.4;
      font-size: 0.72rem;
      margin: 0 0.35rem;
      font-family: 'Fira Code', monospace;
    }
    .cb-menu {
      position: absolute; top: 100%; left: -0.5rem;
      background: rgba(11,16,38,0.92);
      border: 1px solid rgba(40,104,192,0.15);
      border-radius: 4px;
      padding: 0.4rem 0;
      min-width: 130px;
      backdrop-filter: blur(16px);
      z-index: 10;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .cb-menu-item {
      display: block; width: 100%;
      font-family: 'Fira Code', monospace;
      font-size: 0.62rem; font-weight: 400;
      padding: 0.3rem 0.8rem;
      border: none; background: transparent;
      color: var(--text-mid); cursor: pointer;
      text-align: left; letter-spacing: 0.04em;
      transition: color 0.15s, background 0.15s;
    }
    .cb-menu-item:hover { color: var(--text-hi); background: rgba(40,104,192,0.1); }
    .cb-menu-item.active { color: var(--cadmium); }
    .cb-search {
      font-family: 'Fira Code', monospace;
      font-size: 0.68rem; font-weight: 400;
      background: transparent; border: none;
      border-bottom: 1px solid rgba(240,192,64,0.15);
      color: var(--text-hi);
      width: 140px; padding: 0.2rem 0; outline: none;
      margin-left: 0.5rem;
      letter-spacing: 0.04em;
    }
    .cb-search::placeholder { color: var(--text-lo); font-size: 0.62rem; }

    /* ═══════════════════════════════════════════
       CONCEPT C — Floating tag cloud
       Organic, scattered, Van Gogh-ish
    ═══════════════════════════════════════════ */
    .cc-wrap {
      padding: 1.5rem 0;
    }
    .cc-search-row {
      display: flex; align-items: center;
      gap: 1rem; margin-bottom: 1.2rem;
    }
    .cc-search {
      font-family: 'Fira Code', monospace;
      font-size: 0.72rem;
      background: transparent; border: none;
      border-bottom: 1px solid rgba(40,104,192,0.2);
      color: var(--text-hi);
      width: 180px; padding: 0.3rem 0; outline: none;
    }
    .cc-search::placeholder { color: var(--text-lo); }
    .cc-count {
      font-family: 'Fira Code', monospace;
      font-size: 0.6rem; color: var(--text-mid);
      margin-left: auto;
    }
    .cc-tags {
      display: flex; flex-wrap: wrap;
      gap: 0.5rem 0.6rem;
      align-items: baseline;
    }
    .cc-tag {
      font-family: 'Fira Code', monospace;
      font-weight: 400;
      border: none; cursor: pointer;
      letter-spacing: 0.04em;
      transition: all 0.25s;
      background: transparent;
      padding: 0;
    }
    .cc-tag.dim-label {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 0.6rem; font-style: italic; font-weight: 300;
      color: var(--cobalt); opacity: 0.5;
      cursor: default;
      margin-top: 0.15rem;
    }
    .cc-tag.sz-lg { font-size: 0.88rem; color: var(--text-hi); }
    .cc-tag.sz-md { font-size: 0.72rem; color: var(--text-mid); }
    .cc-tag.sz-sm { font-size: 0.6rem; color: var(--text-mid); opacity: 0.7; }
    .cc-tag:not(.dim-label):hover { color: var(--text-hi); }
    .cc-tag.active { color: var(--cadmium) !important; opacity: 1 !important; }
    .cc-tag.active.sz-lg {
      text-shadow: 0 0 20px rgba(240,192,64,0.3);
    }
    .cc-divider {
      width: 1px; height: 16px; margin: 0 0.2rem;
      background: rgba(40,104,192,0.15);
      align-self: center;
    }

    /* ═══════════════════════════════════════════
       CONCEPT D — Sticky top bar, horizontal scroll
       Minimal, app-like
    ═══════════════════════════════════════════ */
    .cd-bar {
      position: sticky; top: 0; z-index: 10;
      background: rgba(11,16,38,0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(40,104,192,0.08);
      padding: 0.6rem 1rem;
      display: flex; flex-direction: column;
      gap: 0.35rem;
    }
    .cd-top {
      display: flex; align-items: center; gap: 1rem;
    }
    .cd-search {
      font-family: 'Fira Code', monospace;
      font-size: 0.72rem;
      background: rgba(40,104,192,0.06);
      border: 1px solid rgba(40,104,192,0.1);
      border-radius: 3px;
      color: var(--text-hi);
      width: 180px; padding: 0.35rem 0.6rem; outline: none;
      transition: border-color 0.2s;
    }
    .cd-search:focus { border-color: var(--cobalt); }
    .cd-search::placeholder { color: var(--text-lo); }
    .cd-count {
      font-family: 'Fira Code', monospace;
      font-size: 0.6rem; color: var(--text-mid);
      margin-left: auto;
    }
    .cd-filters {
      display: flex; gap: 0.3rem;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .cd-filters::-webkit-scrollbar { display: none; }
    .cd-chip {
      font-family: 'Fira Code', monospace;
      font-size: 0.58rem; font-weight: 400;
      padding: 0.2rem 0.55rem;
      border: 1px solid rgba(40,104,192,0.12);
      border-radius: 12px;
      background: transparent;
      color: var(--text-mid); cursor: pointer;
      letter-spacing: 0.04em;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .cd-chip:hover {
      border-color: rgba(40,104,192,0.3);
      color: var(--text-hi);
    }
    .cd-chip.active {
      background: rgba(40,104,192,0.15);
      border-color: rgba(40,104,192,0.35);
      color: var(--cyan);
    }
    .cd-chip.famous.active {
      background: rgba(240,192,64,0.1);
      border-color: rgba(240,192,64,0.3);
      color: var(--cadmium);
    }
    .cd-chip-sep {
      width: 1px;
      background: rgba(40,104,192,0.12);
      margin: 0.15rem 0.15rem;
      flex-shrink: 0;
    }

    /* ═══════════════════════════════════════════
       CONCEPT E — Sentence builder
       "Show me [famous] [paintings] from [arles] of [landscape]"
    ═══════════════════════════════════════════ */
    .ce-wrap {
      padding: 1.5rem 0 1rem;
    }
    .ce-sentence {
      font-size: 1.1rem; font-weight: 300;
      line-height: 2.2;
      color: var(--text-mid);
    }
    .ce-sentence .static { }
    .ce-slot {
      display: inline-block; position: relative;
    }
    .ce-slot-btn {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.1rem; font-weight: 500; font-style: italic;
      color: var(--text-hi);
      border: none; background: transparent;
      cursor: pointer;
      padding: 0.05rem 0.15rem;
      border-bottom: 2px solid rgba(40,104,192,0.3);
      transition: border-color 0.2s, color 0.2s;
    }
    .ce-slot-btn:hover {
      border-color: var(--cyan);
      color: var(--cyan);
    }
    .ce-slot-btn.has-value {
      color: var(--cadmium);
      border-color: rgba(240,192,64,0.4);
    }
    .ce-slot-menu {
      position: absolute; top: calc(100% + 4px); left: -0.5rem;
      background: rgba(11,16,38,0.92);
      border: 1px solid rgba(40,104,192,0.15);
      border-radius: 4px;
      padding: 0.4rem 0;
      min-width: 140px;
      backdrop-filter: blur(16px);
      z-index: 10;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .ce-slot-opt {
      display: block; width: 100%;
      font-family: 'Fira Code', monospace;
      font-size: 0.65rem;
      padding: 0.3rem 0.8rem;
      border: none; background: transparent;
      color: var(--text-mid); cursor: pointer;
      text-align: left; transition: all 0.15s;
    }
    .ce-slot-opt:hover { color: var(--text-hi); background: rgba(40,104,192,0.1); }
    .ce-slot-opt.active { color: var(--cadmium); }
    .ce-count {
      display: block; margin-top: 0.3rem;
      font-family: 'Fira Code', monospace;
      font-size: 0.6rem; color: var(--text-mid);
    }
    .ce-search-row {
      display: flex; align-items: center; gap: 1rem;
      margin-top: 0.8rem;
    }
    .ce-search {
      font-family: 'Fira Code', monospace;
      font-size: 0.68rem;
      background: transparent; border: none;
      border-bottom: 1px solid rgba(40,104,192,0.15);
      color: var(--text-hi);
      width: 200px; padding: 0.3rem 0; outline: none;
    }
    .ce-search::placeholder { color: var(--text-lo); }
  </style>
</head>
<body>

<h1>filter / catalog area — five concepts</h1>

<!-- ════════════ CONCEPT A ════════════ -->
<div class="concept">
  <div class="concept-label">A — sidebar catalog drawer</div>
  <div class="ca-layout">
    <aside class="ca-sidebar">
      <input type="text" class="ca-search" placeholder="search...">
      <div class="ca-group">
        <div class="ca-group-label">collection</div>
        <button class="ca-item active">&#9733; famous</button>
        <button class="ca-item">all works</button>
      </div>
      <div class="ca-group">
        <div class="ca-group-label">type</div>
        <button class="ca-item active">all</button>
        <button class="ca-item">paintings</button>
        <button class="ca-item">watercolors</button>
        <button class="ca-item">sketches</button>
        <button class="ca-item">lithographs</button>
      </div>
      <div class="ca-group">
        <div class="ca-group-label">era</div>
        <button class="ca-item active">all</button>
        <button class="ca-item">hague</button>
        <button class="ca-item">nuenen</button>
        <button class="ca-item">antwerp</button>
        <button class="ca-item">paris</button>
        <button class="ca-item">arles</button>
        <button class="ca-item">saint-r&eacute;my</button>
        <button class="ca-item">auvers</button>
      </div>
      <div class="ca-group">
        <div class="ca-group-label">subject</div>
        <button class="ca-item active">all</button>
        <button class="ca-item">landscape</button>
        <button class="ca-item">portrait</button>
        <button class="ca-item">self-portrait</button>
        <button class="ca-item">still life</button>
        <button class="ca-item">cityscape</button>
        <button class="ca-item">interior</button>
      </div>
      <div class="ca-count">146 works</div>
    </aside>
    <div class="fake-gallery">
      <div class="fake-card"></div><div class="fake-card"></div>
      <div class="fake-card"></div><div class="fake-card"></div>
      <div class="fake-card"></div><div class="fake-card"></div>
    </div>
  </div>
</div>

<!-- ════════════ CONCEPT B ════════════ -->
<div class="concept">
  <div class="concept-label">B — breadcrumb sentence</div>
  <div class="cb-bar">
    <span class="cb-count">146</span>
    <div class="cb-dropdown">
      <button class="cb-selected">famous</button>
      <div class="cb-menu" style="display:none">
        <button class="cb-menu-item active">&#9733; famous</button>
        <button class="cb-menu-item">all works</button>
      </div>
    </div>
    <span class="cb-sep">&middot;</span>
    <div class="cb-dropdown">
      <button class="cb-selected">paintings</button>
    </div>
    <span class="cb-sep">&middot;</span>
    <div class="cb-dropdown">
      <button class="cb-selected">all eras</button>
    </div>
    <span class="cb-sep">&middot;</span>
    <div class="cb-dropdown">
      <button class="cb-selected">all subjects</button>
    </div>
    <input type="text" class="cb-search" placeholder="search...">
  </div>
  <div class="fake-gallery">
    <div class="fake-card"></div><div class="fake-card"></div>
    <div class="fake-card"></div><div class="fake-card"></div>
    <div class="fake-card"></div><div class="fake-card"></div>
  </div>
</div>

<!-- ════════════ CONCEPT C ════════════ -->
<div class="concept">
  <div class="concept-label">C — weighted tag cloud</div>
  <div class="cc-wrap">
    <div class="cc-search-row">
      <input type="text" class="cc-search" placeholder="search...">
      <span class="cc-count">146 works</span>
    </div>
    <div class="cc-tags">
      <button class="cc-tag sz-lg active">&#9733; famous</button>
      <div class="cc-divider"></div>
      <span class="cc-tag dim-label">type</span>
      <button class="cc-tag sz-lg active">paintings</button>
      <button class="cc-tag sz-md">watercolors</button>
      <button class="cc-tag sz-sm">sketches</button>
      <button class="cc-tag sz-sm">lithographs</button>
      <div class="cc-divider"></div>
      <span class="cc-tag dim-label">era</span>
      <button class="cc-tag sz-sm">hague</button>
      <button class="cc-tag sz-sm">nuenen</button>
      <button class="cc-tag sz-sm">antwerp</button>
      <button class="cc-tag sz-md">paris</button>
      <button class="cc-tag sz-lg active">arles</button>
      <button class="cc-tag sz-md">saint-r&eacute;my</button>
      <button class="cc-tag sz-sm">auvers</button>
      <div class="cc-divider"></div>
      <span class="cc-tag dim-label">subject</span>
      <button class="cc-tag sz-lg">landscape</button>
      <button class="cc-tag sz-md">portrait</button>
      <button class="cc-tag sz-md">self-portrait</button>
      <button class="cc-tag sz-sm">still life</button>
      <button class="cc-tag sz-sm">cityscape</button>
      <button class="cc-tag sz-sm">interior</button>
    </div>
  </div>
  <div class="fake-gallery">
    <div class="fake-card"></div><div class="fake-card"></div>
    <div class="fake-card"></div><div class="fake-card"></div>
    <div class="fake-card"></div><div class="fake-card"></div>
  </div>
</div>

<!-- ════════════ CONCEPT D ════════════ -->
<div class="concept">
  <div class="concept-label">D — sticky chip bar</div>
  <div class="cd-bar">
    <div class="cd-top">
      <input type="text" class="cd-search" placeholder="search...">
      <span class="cd-count">146 works</span>
    </div>
    <div class="cd-filters">
      <button class="cd-chip famous active">&#9733; famous</button>
      <div class="cd-chip-sep"></div>
      <button class="cd-chip active">all types</button>
      <button class="cd-chip">paintings</button>
      <button class="cd-chip">watercolors</button>
      <button class="cd-chip">sketches</button>
      <div class="cd-chip-sep"></div>
      <button class="cd-chip">hague</button>
      <button class="cd-chip">nuenen</button>
      <button class="cd-chip">antwerp</button>
      <button class="cd-chip">paris</button>
      <button class="cd-chip active">arles</button>
      <button class="cd-chip">saint-r&eacute;my</button>
      <button class="cd-chip">auvers</button>
      <div class="cd-chip-sep"></div>
      <button class="cd-chip">landscape</button>
      <button class="cd-chip">portrait</button>
      <button class="cd-chip">still life</button>
      <button class="cd-chip">cityscape</button>
    </div>
  </div>
  <div class="fake-gallery" style="margin-top: 1.5rem;">
    <div class="fake-card"></div><div class="fake-card"></div>
    <div class="fake-card"></div><div class="fake-card"></div>
    <div class="fake-card"></div><div class="fake-card"></div>
  </div>
</div>

<!-- ════════════ CONCEPT E ════════════ -->
<div class="concept">
  <div class="concept-label">E — sentence builder</div>
  <div class="ce-wrap">
    <p class="ce-sentence">
      <span class="static">Show me</span>
      <span class="ce-slot">
        <button class="ce-slot-btn has-value">famous</button>
      </span>
      <span class="ce-slot">
        <button class="ce-slot-btn has-value">paintings</button>
        <div class="ce-slot-menu" style="display:none">
          <button class="ce-slot-opt active">all types</button>
          <button class="ce-slot-opt">paintings</button>
          <button class="ce-slot-opt">watercolors</button>
          <button class="ce-slot-opt">sketches</button>
        </div>
      </span>
      <span class="static">from</span>
      <span class="ce-slot">
        <button class="ce-slot-btn">any era</button>
      </span>
      <span class="static">of</span>
      <span class="ce-slot">
        <button class="ce-slot-btn">any subject</button>
      </span>

    <div class="fake-card"></div><div class="fake-card"></div>
    <div class="fake-card"></div><div class="fake-card"></div>

  </div>
</div>

<script>
  // Simple interactivity for the concepts
  // Concept A: toggle active
  document.querySelectorAll('.ca-item').forEach(btn => {
    btn.addEventListener('click', () => {
      const group = btn.closest('.ca-group');
      group.querySelectorAll('.ca-item').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  // Concept B: toggle dropdowns
  document.querySelectorAll('.cb-selected').forEach(btn => {
    btn.addEventListener('click', () => {
      const menu = btn.nextElementSibling;
      if (menu) menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
    });
  });

  // Concept C: toggle tags
  document.querySelectorAll('.cc-tag:not(.dim-label)').forEach(btn => {
    btn.addEventListener('click', () => {
      btn.classList.toggle('active');
    });
  });

  // Concept D: toggle chips
  document.querySelectorAll('.cd-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      btn.classList.toggle('active');
    });
  });

  // Concept E: toggle slot menus
  document.querySelectorAll('.ce-slot-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const menu = btn.parentElement.querySelector('.ce-slot-menu');
      if (menu) menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
    });
  });
</script>

</body>
</html>
